<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Kollektivtavle</title>

  <style>
    :root {
      --bg: #eef4f8;
      --panel: #ffffff;
      --border: #d9e6ef;
      --text: #173042;
      --muted: #5e7687;
      --accent: #0073b0;
      --ok: #0f9d58;
      --warn: #b45309;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    body {
      box-sizing: border-box;
      padding: 20px;
    }

    .container {
      width: 100%;
      min-height: calc(100vh - 40px);
      max-width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 16px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo img {
      max-width: 80%;
      max-height: 80%;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 4px;
    }

    .clock {
      font-size: 2rem;
      color: var(--accent);
      font-weight: bold;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: stretch;
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--text);
    }

    .panel-subtitle {
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .departures {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .departure {
      display: grid;
      grid-template-columns: 72px 1fr 84px;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      align-items: center;
      min-width: 0;
    }

    .departure:last-child {
      border-bottom: none;
    }

    .line {
      font-weight: bold;
      color: var(--accent);
      font-size: 1.35rem;
    }

    .destination {
      font-weight: bold;
      font-size: 1.05rem;
      line-height: 1.2;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time {
      text-align: right;
      font-size: 1rem;
      white-space: nowrap;
    }

    .minutes {
      color: var(--ok);
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .traffic {
      width: 100%;
      max-width: 100%;
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
      box-sizing: border-box;
    }

    .traffic h2 {
      margin: 0;
      font-size: 1.4rem;
      color: var(--text);
    }

    .traffic-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .traffic-item {
      padding: 12px;
      border-radius: 10px;
      background: #f9fcfe;
      border: 1px solid #eee;
    }

    .traffic-title {
      font-weight: bold;
      color: var(--warn);
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .traffic-text {
      font-size: 0.95rem;
      line-height: 1.35;
      color: var(--text);
    }

    .traffic-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .footer {
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      body {
        padding: 16px;
      }

      .container {
        min-height: calc(100vh - 32px);
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="left">
      <div class="logo">
        <img src="https://media.snl.no/media/4802/standard_bi.png" alt="BI logo">
      </div>
      <div>
        <h1>Kollektivtavle</h1>
        <div class="subtitle">Florida og Møhlenpris</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Florida</h2>
      <div class="panel-subtitle">Bybane</div>
      <div id="florida-bybane" class="departures">Laster...</div>
    </div>

    <div class="panel">
      <h2>Florida</h2>
      <div class="panel-subtitle">Buss</div>
      <div id="florida-buss" class="departures">Laster...</div>
    </div>

    <div class="panel">
      <h2>Møhlenpris</h2>
      <div class="panel-subtitle">Buss</div>
      <div id="mohlenpris-buss" class="departures">Laster...</div>
    </div>
  </div>

  <div class="traffic">
    <h2>Trafikkmeldinger</h2>
    <div id="traffic-list" class="traffic-list">Laster...</div>
  </div>

  <div class="footer" id="updated">Oppdaterer...</div>

</div>

<script>
const FLORIDA = "NSR:StopPlace:58544";
const MOHLENPRIS = "NSR:StopPlace:30918";
const CLIENT = "demo-kollektiv";

function clock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
}
setInterval(clock, 1000);
clock();

function getTime(t) {
  return new Date(t).toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
}

function mins(t) {
  const diff = Math.round((new Date(t) - new Date()) / 60000);
  return diff <= 0 ? "nå" : diff + " min";
}

function render(id, data, emptyText = "Ingen avganger funnet") {
  const el = document.getElementById(id);

  if (!data.length) {
    el.innerHTML = `
      <div class="departure">
        <div class="line">-</div>
        <div class="destination">${emptyText}</div>
        <div class="time">--:--</div>
      </div>
    `;
    return;
  }

  el.innerHTML = data.map(c => {
    const t = c.expectedDepartureTime || c.aimedDepartureTime;
    return `
      <div class="departure">
        <div class="line">${c.serviceJourney?.line?.publicCode || "-"}</div>
        <div class="destination">${c.destinationDisplay?.frontText || "Ukjent destinasjon"}</div>
        <div class="time">
          ${getTime(t)}
          <div class="minutes">${mins(t)}</div>
        </div>
      </div>
    `;
  }).join("");
}

function isBybane(c) {
  return (c.serviceJourney?.line?.transportMode || "").toLowerCase() === "tram";
}

function isBus(c) {
  return (c.serviceJourney?.line?.transportMode || "").toLowerCase() === "bus";
}

function getDepartureTimestamp(c) {
  return new Date(c.expectedDepartureTime || c.aimedDepartureTime).getTime();
}

async function fetchStop(id) {
  const q = `{
    stopPlace(id:"${id}") {
      estimatedCalls(numberOfDepartures:30) {
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay { frontText }
        serviceJourney {
          line {
            id
            publicCode
            transportMode
          }
        }
      }
    }
  }`;

  const r = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "ET-Client-Name": CLIENT
    },
    body: JSON.stringify({ query: q })
  });

  if (!r.ok) {
    throw new Error("HTTP " + r.status);
  }

  const j = await r.json();
  return j?.data?.stopPlace?.estimatedCalls || [];
}

function textFromNode(parent, tagName) {
  const node = parent.getElementsByTagName(tagName)[0];
  return node ? node.textContent.trim() : "";
}

function textFromAny(parent, tagNames) {
  for (const tagName of tagNames) {
    const value = textFromNode(parent, tagName);
    if (value) return value;
  }
  return "";
}

function getLineRefsFromSituation(situation) {
  return [...situation.getElementsByTagName("LineRef")]
    .map(node => node.textContent.trim())
    .filter(Boolean);
}

function getStopRefsFromSituation(situation) {
  const tags = ["StopPointRef", "StopPlaceRef", "QuayRef"];
  const refs = [];
  for (const tag of tags) {
    refs.push(
      ...[...situation.getElementsByTagName(tag)]
        .map(node => node.textContent.trim())
        .filter(Boolean)
    );
  }
  return refs;
}

function intersects(setA, values) {
  return values.some(v => setA.has(v));
}

function formatLineIdsForMeta(lineRefs, lineIdMap) {
  const names = lineRefs
    .map(ref => lineIdMap.get(ref))
    .filter(Boolean);

  return [...new Set(names)].join(", ");
}

async function traffic(relevantLineRefs) {
  try {
    const relevantStops = new Set([FLORIDA, MOHLENPRIS]);

    const r = await fetch("https://api.entur.io/realtime/v1/rest/sx?datasetId=SKY", {
      headers: { "ET-Client-Name": CLIENT }
    });

    if (!r.ok) {
      throw new Error("HTTP " + r.status);
    }

    const xml = new DOMParser().parseFromString(await r.text(), "text/xml");
    const situations = [...xml.getElementsByTagName("PtSituationElement")];

    const filtered = situations.filter(situation => {
      const lineRefs = getLineRefsFromSituation(situation);
      const stopRefs = getStopRefsFromSituation(situation);

      const matchesLine = lineRefs.length > 0 && intersects(relevantLineRefs, lineRefs);
      const matchesStop = stopRefs.length > 0 && intersects(relevantStops, stopRefs);

      return matchesLine || matchesStop;
    });

    if (!filtered.length) {
      document.getElementById("traffic-list").innerHTML = `
        <div class="traffic-item">
          <div class="traffic-title">Ingen relevante trafikkmeldinger</div>
          <div class="traffic-text">Ingen aktive meldinger for linjene eller stoppestedene som vises på tavlen.</div>
        </div>
      `;
      return;
    }

    document.getElementById("traffic-list").innerHTML =
      filtered.slice(0, 4).map(situation => {
        const summary =
          textFromAny(situation, ["Summary", "SummaryText"]) || "Trafikkmelding";
        const description =
          textFromAny(situation, ["Description", "Detail", "DetailText"]) || "";
        const lineRefs = getLineRefsFromSituation(situation);
        const lineMeta = formatLineIdsForMeta(lineRefs, relevantLineRefs);

        return `
          <div class="traffic-item">
            <div class="traffic-title">${summary}</div>
            <div class="traffic-text">${description}</div>
            ${lineMeta ? `<div class="traffic-meta">Linjer: ${lineMeta}</div>` : ``}
          </div>
        `;
      }).join("");
  } catch (error) {
    document.getElementById("traffic-list").innerHTML = `
      <div class="traffic-item">
        <div class="traffic-title">Klarte ikke hente trafikkmeldinger</div>
        <div class="traffic-text">Prøv igjen senere.</div>
      </div>
    `;
    console.error(error);
  }
}

async function load() {
  try {
    const [f, m] = await Promise.all([fetchStop(FLORIDA), fetchStop(MOHLENPRIS)]);

    f.sort((a, b) => getDepartureTimestamp(a) - getDepartureTimestamp(b));
    m.sort((a, b) => getDepartureTimestamp(a) - getDepartureTimestamp(b));

    const floridaBybane = f.filter(isBybane).slice(0, 6);
    const floridaBuss = f.filter(isBus).slice(0, 6);
    const mohlenprisBuss = m.filter(isBus).slice(0, 6);

    render("florida-bybane", floridaBybane);
    render("florida-buss", floridaBuss);
    render("mohlenpris-buss", mohlenprisBuss);

    const lineIdMap = new Map();
    [...floridaBybane, ...floridaBuss, ...mohlenprisBuss].forEach(call => {
      const lineId = call?.serviceJourney?.line?.id;
      const publicCode = call?.serviceJourney?.line?.publicCode;
      if (lineId) {
        lineIdMap.set(lineId, publicCode || lineId);
      }
    });

    await traffic(lineIdMap);

    document.getElementById("updated").textContent =
      "Oppdatert " + new Date().toLocaleTimeString("no-NO");
  } catch (error) {
    console.error(error);

    render("florida-bybane", [], "Klarte ikke hente Bybane");
    render("florida-buss", [], "Klarte ikke hente buss");
    render("mohlenpris-buss", [], "Klarte ikke hente buss");

    document.getElementById("traffic-list").innerHTML = `
      <div class="traffic-item">
        <div class="traffic-title">Klarte ikke hente trafikkmeldinger</div>
        <div class="traffic-text">Prøv igjen senere.</div>
      </div>
    `;

    document.getElementById("updated").textContent = "Feil ved oppdatering";
  }
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
