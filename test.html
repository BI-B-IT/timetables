<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Kollektivtavle</title>

  <style>
    :root {
      --bg: #eef4f8;
      --panel: #ffffff;
      --border: #d9e6ef;
      --text: #173042;
      --muted: #5e7687;
      --accent: #0073b0;
      --ok: #0f9d58;
      --warn: #b45309;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 8% 1fr 22% 4%;
      gap: 1vh;
      padding: 1vh 1vw;
      box-sizing: border-box;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    .logo {
      width: 4vw;
      height: 4vw;
      background: white;
      border-radius: 0.5vw;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      max-width: 80%;
    }

    h1 {
      margin: 0;
      font-size: 2.2vw;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1vw;
    }

    .clock {
      font-size: 2vw;
      color: var(--accent);
      font-weight: bold;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1vw;
      height: 100%;
    }

    .panel {
      background: var(--panel);
      border-radius: 1vw;
      border: 1px solid var(--border);
      padding: 1vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.6vw;
    }

    .panel-subtitle {
      color: var(--muted);
      margin-bottom: 0.5vw;
      font-size: 0.9vw;
    }

    .departures {
      flex: 1;
      overflow: hidden;
    }

    .departure {
      display: grid;
      grid-template-columns: 4vw 1fr 4vw;
      gap: 0.5vw;
      padding: 0.6vh 0;
      border-bottom: 1px solid #eee;
      align-items: center;
    }

    .line {
      font-weight: bold;
      color: var(--accent);
      font-size: 1.5vw;
    }

    .destination {
      font-weight: bold;
      font-size: 1.2vw;
    }

    .time {
      text-align: right;
      font-size: 1vw;
    }

    .minutes {
      color: var(--ok);
      font-size: 0.9vw;
    }

    /* TRAFFIC */
    .traffic {
      background: var(--panel);
      border-radius: 1vw;
      border: 1px solid var(--border);
      padding: 1vw;
      overflow: hidden;
    }

    .traffic h2 {
      margin: 0;
      font-size: 1.4vw;
    }

    .traffic-list {
      display: flex;
      flex-direction: column;
      gap: 0.6vh;
      margin-top: 0.5vh;
    }

    .traffic-item {
      padding: 0.6vh;
      border-radius: 0.5vw;
      background: #f9fcfe;
      border: 1px solid #eee;
    }

    .traffic-title {
      font-weight: bold;
      color: var(--warn);
      font-size: 1vw;
    }

    .traffic-text {
      font-size: 0.95vw;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      font-size: 0.9vw;
      color: var(--muted);
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="left">
      <div class="logo">
        <img src="https://media.snl.no/media/4802/standard_bi.png">
      </div>
      <div>
        <h1>Kollektivtavle</h1>
        <div class="subtitle">Florida og Møhlenpris</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Florida</h2>
      <div class="panel-subtitle">Bybane</div>
      <div id="florida-bybane">Laster...</div>
    </div>

    <div class="panel">
      <h2>Florida</h2>
      <div class="panel-subtitle">Buss</div>
      <div id="florida-buss">Laster...</div>
    </div>

    <div class="panel">
      <h2>Møhlenpris</h2>
      <div class="panel-subtitle">Buss</div>
      <div id="mohlenpris-buss">Laster...</div>
    </div>
  </div>

  <div class="traffic">
    <h2>Trafikkmeldinger</h2>
    <div id="traffic-list" class="traffic-list">Laster...</div>
  </div>

  <div class="footer" id="updated">Oppdaterer...</div>

</div>

<script>
const FLORIDA = "NSR:StopPlace:58544";
const MOHLENPRIS = "NSR:StopPlace:30918";
const CLIENT = "demo-kollektiv";

function clock(){
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}
setInterval(clock,1000); clock();

function getTime(t){
  return new Date(t).toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}

function mins(t){
  const diff = Math.round((new Date(t)-new Date())/60000);
  return diff<=0?"nå":diff+" min";
}

function render(id,data){
  document.getElementById(id).innerHTML =
    data.map(c=>{
      const t=c.expectedDepartureTime||c.aimedDepartureTime;
      return `<div class="departure">
        <div class="line">${c.serviceJourney.line.publicCode||"-"}</div>
        <div class="destination">${c.destinationDisplay.frontText}</div>
        <div class="time">${getTime(t)}<div class="minutes">${mins(t)}</div></div>
      </div>`;
    }).join("");
}

function isBybane(c){
  return (c.serviceJourney.line.transportMode||"")==="tram";
}

function isBus(c){
  return (c.serviceJourney.line.transportMode||"")==="bus";
}

async function fetchStop(id){
  const q=`{stopPlace(id:"${id}"){estimatedCalls(numberOfDepartures:30){
    aimedDepartureTime expectedDepartureTime
    destinationDisplay{frontText}
    serviceJourney{line{publicCode transportMode}}
  }}}`;

  const r=await fetch("https://api.entur.io/journey-planner/v3/graphql",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "ET-Client-Name":CLIENT
    },
    body:JSON.stringify({query:q})
  });

  const j=await r.json();
  return j.data.stopPlace.estimatedCalls;
}

async function traffic(){
  const r=await fetch("https://api.entur.io/realtime/v1/rest/sx?datasetId=SKY",{
    headers:{"ET-Client-Name":CLIENT}
  });

  const xml=new DOMParser().parseFromString(await r.text(),"text/xml");
  const msgs=[...xml.getElementsByTagName("PtSituationElement")];

  document.getElementById("traffic-list").innerHTML =
    msgs.slice(0,4).map(m=>`
      <div class="traffic-item">
        <div class="traffic-title">${m.getElementsByTagName("Summary")[0]?.textContent||""}</div>
        <div class="traffic-text">${m.getElementsByTagName("Description")[0]?.textContent||""}</div>
      </div>
    `).join("");
}

async function load(){
  const [f,m]=await Promise.all([fetchStop(FLORIDA),fetchStop(MOHLENPRIS)]);

  f.sort((a,b)=>new Date(a.expectedDepartureTime)-new Date(b.expectedDepartureTime));
  m.sort((a,b)=>new Date(a.expectedDepartureTime)-new Date(b.expectedDepartureTime));

  render("florida-bybane",f.filter(isBybane).slice(0,6));
  render("florida-buss",f.filter(isBus).slice(0,6));
  render("mohlenpris-buss",m.filter(isBus).slice(0,6));

  traffic();

  document.getElementById("updated").textContent="Oppdatert "+new Date().toLocaleTimeString("no-NO");
}

load();
setInterval(load,30000);
</script>

</body>
</html>
