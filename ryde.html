<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Ryde-kart</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .panel {
      position: absolute;
      z-index: 1000;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,0.96);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      max-width: 320px;
    }
    .panel h1 { font-size: 16px; margin: 0 0 6px; }
    .panel p { font-size: 13px; margin: 6px 0; line-height: 1.4; }
    .panel input, .panel button {
      width: 100%; box-sizing: border-box; margin-top: 8px;
      padding: 10px; border-radius: 8px; border: 1px solid #d0d7de;
    }
    .panel button { cursor: pointer; background: #111827; color: white; border: none; }
    .meta { font-size: 12px; color: #555; margin-top: 8px; }
    .legend { font-size: 12px; color: #333; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Live Ryde-kart</h1>
    <p>Viser tilgjengelige RYDE-kjøretøy fra Entur/GBFS rundt valgt adresse. Standardoppsettet er satt til <code>Kong Christian Frederiks plass 5, 5006 Bergen</code>.</p>
    <input id="address" value="Kong Christian Frederiks plass 5, 5006 Bergen" placeholder="Adresse" />
    <input id="radius" type="number" value="800" min="100" step="100" placeholder="Radius i meter" />
    <input id="systemId" value="rydeskien" placeholder="F.eks. rydeskien" />
    <button id="loadBtn">Last inn / oppdater</button>
    <div class="meta" id="status">Klar.</div>
    <div class="legend">Tips: For andre byer, bytt system-id til riktig Ryde-feed fra Entur-manifestet.</div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([60.39299, 5.32415], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap-bidragsytere'
    }).addTo(map);

    const markers = L.layerGroup().addTo(map);
    let zoneLayer;
    let addressMarker;
    let radiusCircle;

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { 'ET-Client-Name': 'demo-ryde-map' } });
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      return await res.json();
    }

    async function geocodeAddress(address) {
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=no&q=${encodeURIComponent(address)}`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'no' } });
      if (!res.ok) throw new Error('Kunne ikke geokode adressen.');
      const data = await res.json();
      if (!data.length) throw new Error('Fant ikke adressen.');
      return { lat: Number(data[0].lat), lon: Number(data[0].lon), label: data[0].display_name };
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    async function loadRydeSystem() {
      const systemId = document.getElementById('systemId').value.trim();
      const address = document.getElementById('address').value.trim();
      const radius = Number(document.getElementById('radius').value || 800);
      if (!systemId || !address) return;

      setStatus(`Laster ${systemId} rundt ${address} ...`);
      markers.clearLayers();
      if (zoneLayer) {
        map.removeLayer(zoneLayer);
        zoneLayer = null;
      }
      if (addressMarker) map.removeLayer(addressMarker);
      if (radiusCircle) map.removeLayer(radiusCircle);

      try {
        const center = await geocodeAddress(address);
        addressMarker = L.marker([center.lat, center.lon]).addTo(map).bindPopup(`Adresse: ${center.label}`);
        radiusCircle = L.circle([center.lat, center.lon], { radius }).addTo(map);

        const gbfsRoot = await fetchJson(`https://api.entur.io/mobility/v2/gbfs/v3/${systemId}/gbfs`);
        const feeds = gbfsRoot?.data?.feeds || [];
        const vehicleStatusUrl = feeds.find(f => f.name === 'vehicle_status')?.url;
        const geofencingUrl = feeds.find(f => f.name === 'geofencing_zones')?.url;
        const systemInfoUrl = feeds.find(f => f.name === 'system_information')?.url;

        if (!vehicleStatusUrl) throw new Error('Fant ikke vehicle_status-feed.');

        const [vehicleStatus, geofencing, systemInfo] = await Promise.all([
          fetchJson(vehicleStatusUrl),
          geofencingUrl ? fetchJson(geofencingUrl).catch(() => null) : Promise.resolve(null),
          systemInfoUrl ? fetchJson(systemInfoUrl).catch(() => null) : Promise.resolve(null)
        ]);

        const vehicles = vehicleStatus?.data?.vehicles || [];
        const available = vehicles.filter(v => {
          if (typeof v.lat !== 'number' || typeof v.lon !== 'number') return false;
          if (typeof v.is_reserved === 'boolean' && v.is_reserved) return false;
          if (typeof v.is_disabled === 'boolean' && v.is_disabled) return false;
          if (typeof v.is_available === 'boolean' && !v.is_available) return false;
          return distanceMeters(center.lat, center.lon, v.lat, v.lon) <= radius;
        });

        const latlngs = [[center.lat, center.lon]];
        available.forEach(v => {
          const dist = Math.round(distanceMeters(center.lat, center.lon, v.lat, v.lon));
          const marker = L.circleMarker([v.lat, v.lon], { radius: 6 });
          marker.bindPopup(`
            <strong>${systemInfo?.data?.name || systemId}</strong><br>
            ID: ${v.vehicle_id || 'ukjent'}<br>
            Avstand: ${dist} m<br>
            Batteri: ${v.current_range_meters ? Math.round(v.current_range_meters/1000) + ' km estimert' : 'ukjent'}<br>
            Type: ${v.vehicle_type_id || 'ukjent'}
          `);
          marker.addTo(markers);
          latlngs.push([v.lat, v.lon]);
        });

        const features = geofencing?.data?.geofencing_zones?.features;
        if (features?.length) {
          zoneLayer = L.geoJSON({ type: 'FeatureCollection', features }).addTo(map);
        }

        map.fitBounds(L.latLngBounds(latlngs).pad(0.15));
        setStatus(`Oppdatert: ${available.length} tilgjengelige kjøretøy innen ${radius} meter.`);
      } catch (err) {
        console.error(err);
        setStatus(`Feil: ${err.message}`);
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadRydeSystem);
    loadRydeSystem();
    setInterval(loadRydeSystem, 30000);
  </script>
</body>
</html>
