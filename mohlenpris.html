<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Møhlenpris – Buss</title>

  <style>
    :root {
      --bg: #eef4f8;
      --panel: #ffffff;
      --border: #d9e6ef;
      --text: #173042;
      --muted: #5e7687;
      --accent: #0073b0;
      --accent-soft: #e6f2f9;
      --ok: #0f9d58;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      max-width: 70%;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    .subtitle {
      color: var(--muted);
    }

    .clock {
      font-size: 2rem;
      color: var(--accent);
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
    }

    .panel h2 {
      margin-top: 0;
    }

    .departure {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .line {
      font-weight: bold;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .destination {
      font-weight: bold;
    }

    .time {
      text-align: right;
    }

    .minutes {
      color: var(--ok);
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="left">
      <div class="logo">
        <img src="https://media.snl.no/media/4802/standard_bi.png" alt="BI logo">
      </div>
      <div>
        <h1>Møhlenpris</h1>
        <div class="subtitle">Bergen · Buss</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Neste avganger</h2>
      <div id="buss">Laster...</div>
    </div>
  </div>

  <div class="footer" id="updated">Oppdaterer...</div>

</div>

<script>
const STOP_ID = "NSR:StopPlace:30918";

function clock(){
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}
setInterval(clock,1000);
clock();

function getTime(t){
  return new Date(t).toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}

function mins(t){
  const diff = Math.round((new Date(t)-new Date())/60000);
  return diff <= 0 ? "nå" : diff + " min";
}

function isBus(c){
  const mode = (c.serviceJourney.line.transportMode || "").toLowerCase();
  return mode === "bus";
}

function render(id,data){
  const el = document.getElementById(id);

  if (!data.length) {
    el.innerHTML = `<div class="departure">
      <div class="line">-</div>
      <div><div class="destination">Ingen avganger funnet</div></div>
      <div class="time">--:--</div>
    </div>`;
    return;
  }

  el.innerHTML = data.map(c => {
    const t = c.expectedDepartureTime || c.aimedDepartureTime;
    return `
      <div class="departure">
        <div class="line">${c.serviceJourney.line.publicCode || "-"}</div>
        <div>
          <div class="destination">${c.destinationDisplay?.frontText || "Ukjent destinasjon"}</div>
        </div>
        <div class="time">
          ${getTime(t)}
          <div class="minutes">${mins(t)}</div>
        </div>
      </div>`;
  }).join("");
}

async function fetchData(){
  const query = `{
    stopPlace(id:"${STOP_ID}") {
      estimatedCalls(numberOfDepartures:30) {
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay { frontText }
        serviceJourney { line { publicCode name transportMode } }
      }
    }
  }`;

  try {
    const res = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ET-Client-Name": "github-demo-mohlenpris"
      },
      body: JSON.stringify({ query })
    });

    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }

    const json = await res.json();
    const calls = json?.data?.stopPlace?.estimatedCalls || [];

    const sorted = calls
      .filter(isBus)
      .sort((a, b) =>
        new Date(a.expectedDepartureTime || a.aimedDepartureTime) -
        new Date(b.expectedDepartureTime || b.aimedDepartureTime)
      );

    render("buss", sorted.slice(0, 8));

    document.getElementById("updated").textContent =
      "Oppdatert: " + new Date().toLocaleTimeString("no-NO");
  } catch (error) {
    document.getElementById("buss").innerHTML = `<div class="departure">
      <div class="line">!</div>
      <div><div class="destination">Klarte ikke hente avganger</div></div>
      <div class="time">--:--</div>
    </div>`;

    document.getElementById("updated").textContent =
      "Feil ved oppdatering";
    console.error(error);
  }
}

fetchData();
setInterval(fetchData,30000);
</script>

</body>
</html>
