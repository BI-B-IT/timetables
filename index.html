<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Florida – Bybane og buss</title>

  <style>
    :root {
      --bg: #eef4f8;
      --panel: #ffffff;
      --border: #d9e6ef;
      --text: #173042;
      --muted: #5e7687;
      --accent: #0073b0;
      --accent-soft: #e6f2f9;
      --ok: #0f9d58;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      max-width: 70%;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    .subtitle {
      color: var(--muted);
    }

    .clock {
      font-size: 2rem;
      color: var(--accent);
      font-weight: bold;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
    }

    .panel h2 {
      margin-top: 0;
    }

    .departure {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .line {
      font-weight: bold;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .destination {
      font-weight: bold;
    }

    .time {
      text-align: right;
    }

    .minutes {
      color: var(--ok);
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      text-align: center;
    }

    @media(max-width: 800px){
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="left">
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/BI_Norwegian_Business_School_logo.svg">
      </div>
      <div>
        <h1>Florida</h1>
        <div class="subtitle">Bergen · Bybane og buss</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Bybane</h2>
      <div id="bybane">Laster...</div>
    </div>

    <div class="panel">
      <h2>Buss</h2>
      <div id="buss">Laster...</div>
    </div>
  </div>

  <div class="footer" id="updated">Oppdaterer...</div>

</div>

<script>
const STOP_ID = "NSR:StopPlace:58544";

function clock(){
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}
setInterval(clock,1000); clock();

function getTime(t){
  return new Date(t).toLocaleTimeString("no-NO",{hour:'2-digit',minute:'2-digit'});
}

function mins(t){
  const diff = Math.round((new Date(t)-new Date())/60000);
  return diff<=0 ? "nå" : diff+" min";
}

function isBybane(c){
  const mode = (c.serviceJourney.line.transportMode||"").toLowerCase();
  const name = (c.serviceJourney.line.name||"").toLowerCase();
  return mode==="tram" || name.includes("bybane");
}

function isBus(c){
  const mode = (c.serviceJourney.line.transportMode||"").toLowerCase();
  return mode==="bus";
}

function render(id,data){
  document.getElementById(id).innerHTML =
    data.map(c=>{
      const t = c.expectedDepartureTime || c.aimedDepartureTime;
      return `
        <div class="departure">
          <div class="line">${c.serviceJourney.line.publicCode||"-"}</div>
          <div>
            <div class="destination">${c.destinationDisplay.frontText}</div>
          </div>
          <div class="time">
            ${getTime(t)}
            <div class="minutes">${mins(t)}</div>
          </div>
        </div>`;
    }).join("");
}

async function fetchData(){
  const query = `{
    stopPlace(id:"${STOP_ID}") {
      estimatedCalls(numberOfDepartures:30) {
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay{frontText}
        serviceJourney{line{publicCode name transportMode}}
      }
    }
  }`;

  const res = await fetch("https://api.entur.io/journey-planner/v3/graphql",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "ET-Client-Name":"github-demo-florida"
    },
    body:JSON.stringify({query})
  });

  const json = await res.json();
  const calls = json.data.stopPlace.estimatedCalls;

  const sorted = calls.sort((a,b)=>
    new Date(a.expectedDepartureTime||a.aimedDepartureTime) -
    new Date(b.expectedDepartureTime||b.aimedDepartureTime)
  );

  render("bybane", sorted.filter(isBybane).slice(0,5));
  render("buss", sorted.filter(isBus).slice(0,5));

  document.getElementById("updated").textContent =
    "Oppdatert: "+new Date().toLocaleTimeString("no-NO");
}

fetchData();
setInterval(fetchData,30000);
</script>

</body>
</html>
