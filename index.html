<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florida – Bybane og buss</title>
  <style>
    :root {
      --bg: #eef4f8;
      --bg2: #f8fbfd;
      --panel: #ffffff;
      --panel-border: #d9e6ef;
      --text: #173042;
      --muted: #5e7687;
      --accent: #0073b0;
      --accent-soft: #e6f2f9;
      --ok: #0f9d58;
      --warn: #d97706;
      --shadow: 0 10px 28px rgba(17, 43, 60, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, #ffffff 0%, #f7fbfd 30%, #eef4f8 100%);
      color: var(--text);
    }

    body {
      padding: 28px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand-and-title {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 280px;
    }

    .logo-wrap {
      width: 86px;
      height: 86px;
      background: white;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-wrap img {
      max-width: 78%;
      max-height: 78%;
      object-fit: contain;
      display: block;
    }

    .title h1 {
      margin: 0;
      font-size: 2.5rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .title .subtitle {
      margin-top: 8px;
      font-size: 1.08rem;
      color: var(--muted);
    }

    .clock-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 16px 22px;
      box-shadow: var(--shadow);
      min-width: 220px;
      text-align: right;
    }

    .clock-label {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .clock {
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 12px 16px;
    }

    .status-left,
    .status-right {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid #edf3f7;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
    }

    .panel-title {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: -0.02em;
    }

    .panel-badge {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 7px 12px;
      border-radius: 999px;
    }

    .departures {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
    }

    .departure {
      display: grid;
      grid-template-columns: 92px 1fr 110px;
      gap: 14px;
      align-items: center;
      background: #f9fcfe;
      border: 1px solid #e6eef4;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .line-box {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 68px;
      border-radius: 16px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      text-align: center;
      padding: 10px;
    }

    .line-number {
      font-size: 1.4rem;
      line-height: 1.1;
    }

    .line-mode {
      font-size: 0.78rem;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .destination {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.3;
    }

    .time-block {
      text-align: right;
    }

    .time-abs {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .time-rel {
      margin-top: 5px;
      font-size: 1rem;
      color: var(--ok);
      font-weight: 700;
    }

    .loading,
    .error,
    .empty {
      background: #f9fcfe;
      border: 1px solid #e6eef4;
      color: var(--muted);
      border-radius: 18px;
      padding: 18px;
      font-size: 1rem;
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 0.92rem;
    }

    @media (max-width: 980px) {
      .board {
        grid-template-columns: 1fr;
      }

      .clock-card {
        text-align: left;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .brand-and-title {
        align-items: flex-start;
      }

      .logo-wrap {
        width: 72px;
        height: 72px;
      }

      .title h1 {
        font-size: 2rem;
      }

      .departure {
        grid-template-columns: 82px 1fr;
      }

      .time-block {
        grid-column: 1 / -1;
        text-align: left;
        padding-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand-and-title">
        <div class="logo-wrap">
          <img
            src="bi-logo.svg"
            alt="BI logo"
            onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=&quot;font-weight:700;font-size:1.4rem;color:#0073b0;&quot;>BI</div>';"
          />
        </div>

        <div class="title">
          <h1>Florida</h1>
          <div class="subtitle">Bergen · sanntid for Bybane og buss</div>
        </div>
      </div>

      <div class="clock-card">
        <div class="clock-label">Klokken er</div>
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <div class="statusbar">
      <div class="status-left" id="lastUpdated">Oppdaterer avganger…</div>
      <div class="status-right">Oppdateres automatisk hvert 30. sekund</div>
    </div>

    <main class="board">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Bybane</h2>
          <div class="panel-badge">Florida</div>
        </div>
        <div class="departures" id="bybane">
          <div class="loading">Laster Bybane-avganger…</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Buss</h2>
          <div class="panel-badge">Florida</div>
        </div>
        <div class="departures" id="buss">
          <div class="loading">Laster bussavganger…</div>
        </div>
      </section>
    </main>

    <div class="footer">
      Data fra Entur · stoppested Florida i Bergen
    </div>
  </div>

  <script>
    const STOP_PLACE_ID = "NSR:StopPlace:58544";
    const ET_CLIENT_NAME = "din-github-bruker-florida-skjerm";

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString("no-NO", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function formatTime(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString("no-NO", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function minutesUntil(isoString) {
      const now = new Date();
      const then = new Date(isoString);
      const diffMinutes = Math.round((then - now) / 60000);

      if (diffMinutes <= 0) return "nå";
      if (diffMinutes === 1) return "1 min";
      return `${diffMinutes} min`;
    }

    function getDepartureTime(call) {
      return call?.expectedDepartureTime || call?.aimedDepartureTime || null;
    }

    function getTransportMode(call) {
      return (call?.serviceJourney?.line?.transportMode || "").toLowerCase();
    }

    function getLineName(call) {
      return (call?.serviceJourney?.line?.name || "").toLowerCase();
    }

    function getLineCode(call) {
      return call?.serviceJourney?.line?.publicCode || "";
    }

    function isBybane(call) {
      const mode = getTransportMode(call);
      const lineName = getLineName(call);
      const lineCode = getLineCode(call);

      return (
        mode === "tram" ||
        mode === "rail" ||
        lineName.includes("bybane") ||
        lineCode === "1"
      );
    }

    function isBus(call) {
      const mode = getTransportMode(call);
      return mode === "bus";
    }

    function modeLabel(call) {
      return isBybane(call) ? "Bybane" : "Buss";
    }

    function renderDepartures(targetId, departures) {
      const target = document.getElementById(targetId);

      if (!departures.length) {
        target.innerHTML = `<div class="empty">Ingen avganger funnet akkurat nå.</div>`;
        return;
      }

      target.innerHTML = departures.map(call => {
        const line = getLineCode(call) || "–";
        const destination = call?.destinationDisplay?.frontText || "Ukjent destinasjon";
        const departureTime = getDepartureTime(call);
        const quayCode = call?.quay?.publicCode;
        const realtime = call?.realtime ? "Sanntid" : "Planlagt";
        const platformText = quayCode ? `Plattform ${quayCode}` : "Plattform ikke oppgitt";

        return `
          <article class="departure">
            <div class="line-box">
              <div class="line-number">${line}</div>
              <div class="line-mode">${modeLabel(call)}</div>
            </div>

            <div>
              <div class="destination">${destination}</div>
              <div class="meta">${platformText} · ${realtime}</div>
            </div>

            <div class="time-block">
              <div class="time-abs">${formatTime(departureTime)}</div>
              <div class="time-rel">${minutesUntil(departureTime)}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function fetchDepartures() {
      const query = `
      {
        stopPlace(id: "${STOP_PLACE_ID}") {
          id
          name
          estimatedCalls(numberOfDepartures: 30) {
            realtime
            aimedDepartureTime
            expectedDepartureTime
            destinationDisplay {
              frontText
            }
            serviceJourney {
              line {
                id
                publicCode
                name
                transportMode
              }
            }
            quay {
              id
              publicCode
            }
          }
        }
      }`;

      try {
        const response = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "ET-Client-Name": ET_CLIENT_NAME
          },
          body: JSON.stringify({ query })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();

        if (result.errors) {
          console.error(result.errors);
          throw new Error("GraphQL-feil fra Entur");
        }

        const calls = result?.data?.stopPlace?.estimatedCalls || [];

        const sorted = calls
          .filter(call => getDepartureTime(call))
          .sort((a, b) => {
            return new Date(getDepartureTime(a)) - new Date(getDepartureTime(b));
          });

        const bybane = sorted.filter(isBybane).slice(0, 6);
        const buss = sorted.filter(isBus).slice(0, 6);

        renderDepartures("bybane", bybane);
        renderDepartures("buss", buss);

        document.getElementById("lastUpdated").textContent =
          `Sist oppdatert: ${new Date().toLocaleTimeString("no-NO", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          })}`;
      } catch (error) {
        console.error(error);
        document.getElementById("bybane").innerHTML =
          `<div class="error">Klarte ikke hente Bybane-data.</div>`;
        document.getElementById("buss").innerHTML =
          `<div class="error">Klarte ikke hente bussdata.</div>`;
        document.getElementById("lastUpdated").textContent =
          `Feil ved oppdatering: ${error.message}`;
      }
    }

    updateClock();
    setInterval(updateClock, 1000);

    fetchDepartures();
    setInterval(fetchDepartures, 30000);
  </script>
</body>
</html>
