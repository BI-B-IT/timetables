<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florida – Bybane og buss</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #334155;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --ok: #22c55e;
      --warn: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 1rem;
    }

    .clock {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 1.5rem;
    }

    .departures {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .departure {
      background: var(--card2);
      border-radius: 14px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      gap: 12px;
      align-items: center;
    }

    .line {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent);
    }

    .destination {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .time {
      text-align: right;
    }

    .clocktime {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .minutes {
      color: var(--ok);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .error, .loading, .empty {
      background: rgba(51, 65, 85, 0.7);
      border-radius: 14px;
      padding: 16px;
      color: var(--muted);
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .departure {
        grid-template-columns: 75px 1fr 75px;
      }

      .clock {
        font-size: 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Florida</h1>
        <div class="subtitle">Bergen · Bybane og buss</div>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>

    <div class="statusbar">
      <div id="lastUpdated">Oppdaterer…</div>
      <div>Oppdateres automatisk hvert 30. sekund</div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>Bybane</h2>
        <div id="bybane" class="departures">
          <div class="loading">Laster avganger…</div>
        </div>
      </section>

      <section class="panel">
        <h2>Buss</h2>
        <div id="buss" class="departures">
          <div class="loading">Laster avganger…</div>
        </div>
      </section>
    </div>

    <div class="footer">
      Data fra Entur API
    </div>
  </div>

  <script>
    const STOP_PLACE_ID = "NSR:StopPlace:58544";
    const ET_CLIENT_NAME = "dingithubbruker-florida-tavle";

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleTimeString("no-NO", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function minutesUntil(isoString) {
      const now = new Date();
      const departure = new Date(isoString);
      const diffMs = departure - now;
      const diffMin = Math.round(diffMs / 60000);

      if (diffMin <= 0) return "nå";
      return `${diffMin} min`;
    }

    function isBybane(call) {
      const code = call?.serviceJourney?.line?.publicCode || "";
      const name = (call?.serviceJourney?.line?.name || "").toLowerCase();
      return code.startsWith("1") || name.includes("bybane") || name.includes("bergen light rail");
    }

    function renderDepartures(elementId, departures) {
      const el = document.getElementById(elementId);

      if (!departures.length) {
        el.innerHTML = `<div class="empty">Ingen avganger funnet.</div>`;
        return;
      }

      el.innerHTML = departures.map(call => {
        const line = call?.serviceJourney?.line?.publicCode || "-";
        const destination = call?.destinationDisplay?.frontText || "Ukjent destinasjon";
        const departureTime = call.expectedDepartureTime || call.aimedDepartureTime;
        const quay = call?.quay?.publicCode ? `Plattform ${call.quay.publicCode}` : "";

        return `
          <div class="departure">
            <div class="line">${line}</div>
            <div>
              <div class="destination">${destination}</div>
              <div class="meta">${quay}${call.realtime ? " · sanntid" : ""}</div>
            </div>
            <div class="time">
              <div class="clocktime">${formatTime(departureTime)}</div>
              <div class="minutes">${minutesUntil(departureTime)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function fetchDepartures() {
      const query = `
      {
        stopPlace(id: "${STOP_PLACE_ID}") {
          id
          name
          estimatedCalls(numberOfDepartures: 20) {
            realtime
            aimedDepartureTime
            expectedDepartureTime
            destinationDisplay {
              frontText
            }
            serviceJourney {
              line {
                id
                publicCode
                name
              }
            }
            quay {
              id
              publicCode
            }
          }
        }
      }`;

      try {
        const response = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "ET-Client-Name": ET_CLIENT_NAME
          },
          body: JSON.stringify({ query })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();

        const calls = result?.data?.stopPlace?.estimatedCalls || [];

        const sorted = calls
          .filter(call => call.expectedDepartureTime || call.aimedDepartureTime)
          .sort((a, b) => {
            const ta = new Date(a.expectedDepartureTime || a.aimedDepartureTime).getTime();
            const tb = new Date(b.expectedDepartureTime || b.aimedDepartureTime).getTime();
            return ta - tb;
          });

        const bybane = sorted.filter(isBybane).slice(0, 6);
        const buss = sorted.filter(call => !isBybane(call)).slice(0, 6);

        renderDepartures("bybane", bybane);
        renderDepartures("buss", buss);

        document.getElementById("lastUpdated").textContent =
          `Sist oppdatert: ${new Date().toLocaleTimeString("no-NO", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          })}`;
      } catch (error) {
        document.getElementById("bybane").innerHTML =
          `<div class="error">Klarte ikke hente data.</div>`;
        document.getElementById("buss").innerHTML =
          `<div class="error">Klarte ikke hente data.</div>`;
        document.getElementById("lastUpdated").textContent =
          `Feil ved oppdatering: ${error.message}`;
        console.error(error);
      }
    }

    updateClock();
    setInterval(updateClock, 1000);

    fetchDepartures();
    setInterval(fetchDepartures, 30000);
  </script>
</body>
</html>
